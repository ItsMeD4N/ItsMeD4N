name: Generate Pacman Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Pacman style snake
        uses: Platane/snk@v3
        with:
          github_user_name: ItsMeD4N
          outputs: |
            dist/pacman.svg?palette=github-dark&color_snake=#FFD700&color_dots=#222222,#444444,#888888,#CCCCCC,#FFFFFF

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
